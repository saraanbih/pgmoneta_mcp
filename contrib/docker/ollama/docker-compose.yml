services:
  ollama:
    build: .
    container_name: pgmoneta-mcp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODEL=llama3.1:8b
    restart: unless-stopped

volumes:
  ollama_data:
